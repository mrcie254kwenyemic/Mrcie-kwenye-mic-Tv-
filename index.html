<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mrcie Kwenye Mic TV</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  header {
    background: red;
    padding: 14px;
    font-size: 22px;
    font-weight: bold;
  }

  .live {
    color: lime;
    animation: blink 1s infinite;
    font-weight: bold;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .screen {
    margin-top: 15px;
  }

  iframe {
    width: 92%;
    height: 420px;
    border: none;
    border-radius: 10px;
  }

  .info {
    margin-top: 10px;
    font-size: 18px;
    color: #00ffcc;
  }

  .buttons {
    margin-top: 15px;
  }

  button {
    padding: 10px 14px;
    margin: 5px;
    background: #222;
    color: white;
    border: 1px solid #555;
    cursor: pointer;
  }

  button:hover {
    background: red;
  }
</style>
</head>

<body>

<header>
  🔴 MRCIE KWENYE MIC TV <span class="live">LIVE</span>
</header>

<div class="info" id="scheduleText">
  Loading schedule...
</div>

<div class="screen">
  <iframe id="tv"
    src=""
    allowfullscreen>
  </iframe>
</div>

<div class="buttons">
  <button onclick="setChannel('MORNING')">Morning Show</button>
  <button onclick="setChannel('AFTERNOON')">Afternoon Hits</button>
  <button onclick="setChannel('NIGHT')">Night Vibes</button>
</div>

<script>
const channels = {
  MORNING: "PLATZznebejzc",
  AFTERNOON: "PLATZznebejzc",
  NIGHT: "PLATZznebejzc"
};

// AUTO SCHEDULE BASED ON TIME
function getAutoChannel() {
  let hour = new Date().getHours();

  if (hour >= 5 && hour < 12) return "MORNING";
  if (hour >= 12 && hour < 18) return "AFTERNOON";
  return "NIGHT";
}

function loadChannel(name) {
  document.getElementById("tv").src =
    "https://www.youtube.com/embed/videoseries?list=" + channels[name];

  document.getElementById("scheduleText").innerText =
    "Now Playing: " + name + " SHOW";
}

// MANUAL SWITCH
function setChannel(name) {
  loadChannel(name);
}

// AUTO START
function autoStart() {
  let current = getAutoChannel();
  loadChannel(current);
}

// AUTO UPDATE EVERY 60 SECONDS
setInterval(() => {
  autoStart();
}, 60000);

// START ON LOAD
autoStart();
</script>

</body>
</html>
