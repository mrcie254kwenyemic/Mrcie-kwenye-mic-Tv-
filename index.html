<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mrcie Kwenye Mic TV</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
overflow:hidden;
}

header{
background:#b30000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.live{
background:red;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

#clock{
font-size:20px;
}

.player{
height:calc(100vh - 120px);
}

iframe{
width:100%;
height:100%;
border:none;
}

.ticker{
position:fixed;
bottom:0;
width:100%;
background:#111;
color:#00ff00;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>

</head>

<body>

<header>
<div class="logo">📺 MRCIE KWENYE MIC TV</div>
<div class="live">🔴 LIVE</div>
<div id="clock"></div>
</header>

<div class="player">
<iframe
src="https://www.youtube.com/embed/videoseries?list=PLATZznebejzc&autoplay=1&loop=1&playlist=PLATZznebejzc"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<div class="ticker">
<span>
Welcome to Mrcie Kwenye Mic TV • Streaming 24/7 • Music • Reggae • Gengetone • Hip Hop • Urban Sounds • Subscribe and Share!
</span>
</div>

<script>
function updateClock(){
const now=new Date();
document.getElementById("clock").innerHTML=now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
  </html>
