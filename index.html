<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mrcie Kwenye Mic TV</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    header {
      background: red;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .live {
      color: lime;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .screen {
      margin-top: 20px;
    }

    iframe {
      width: 92%;
      height: 420px;
      border: none;
      border-radius: 10px;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      background: #222;
      color: white;
      border: 1px solid #555;
      cursor: pointer;
    }

    button:hover {
      background: red;
    }

    footer {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  🔴 MRCIE KWENYE MIC TV <span class="live">LIVE</span>
</header>

<div class="screen">
  <iframe id="tv"
    src="https://www.youtube.com/embed/videoseries?list=PLATZznebejzc"
    allowfullscreen>
  </iframe>
</div>

<div class="buttons">
  <button onclick="changeChannel('PLATZznebejzc')">Music 24/7</button>
  <button onclick="changeChannel('PLATZznebejzc')">Live Stream</button>
</div>

<footer>
  © 2026 Mrcie TV | Powered by GitHub Pages
</footer>

<script>
function changeChannel(listId) {
  document.getElementById("tv").src =
    "https://www.youtube.com/embed/videoseries?list=" + listId;
}
</script>

</body>
</html>
