
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mrcie Kwenye Mic TV</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
overflow:hidden;
}

header{
height:60px;
background:#b30000;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
}

.logo{
font-size:28px;
font-weight:bold;
}

.live{
background:red;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

#clock{
font-size:20px;
}

.player{
height:calc(100vh - 100px);
}

iframe{
width:100%;
height:100%;
border:none;
}

.watermark{
position:fixed;
top:75px;
right:15px;
background:rgba(255,0,0,0.8);
padding:10px 15px;
font-size:18px;
font-weight:bold;
border-radius:10px;
z-index:9999;
}

.ticker{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
color:#00ff00;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style><body>

<header>
  <div class="logo">📺 MRCIE KWENYE MIC TV</div>
  <div class="live">🔴 LIVE</div>
  <div id="clock"></div>
</header>

<div class="watermark">
  MRCIE TV
</div>

<div class="player" id="player">
  <iframe
    src="https://www.youtube.com/embed/videoseries?list=PLATZznebejzc&autoplay=1&loop=1&playlist=PLATZznebejzc"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<div id="breakScreen" style="display:none;width:100%;height:calc(100vh - 100px);background:#000;color:#fff;text-align:center;padding-top:120px;">
  <h1>📺 MRCIE KWENYE MIC TV</h1>
  <h2>We'll Be Right Back</h2>
  <h3>Break Time</h3>
  <p id="countdown"></p>
</div>

<div class="ticker">
  <span>
    Welcome to Mrcie Kwenye Mic TV • Streaming 24/7 • Reggae • Gengetone • Hip Hop • Urban Music • Subscribe • Share • Enjoy!
  </span>
</div><script>
// Live clock
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// TV break settings
const BREAK_EVERY = 2 * 60 * 60 * 1000; // 2 hours
const BREAK_LENGTH = 5 * 60; // 5 minutes

function startBreak() {
  document.getElementById("player").style.display = "none";
  document.getElementById("breakScreen").style.display = "block";

  let seconds = BREAK_LENGTH;

  const timer = setInterval(() => {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;

    document.getElementById("countdown").textContent =
      "Broadcast resumes in " +
      mins + ":" + (secs < 10 ? "0" : "") + secs;

    seconds--;

    if (seconds < 0) {
      clearInterval(timer);

      document.getElementById("breakScreen").style.display = "none";
      document.getElementById("player").style.display = "block";
    }
  }, 1000);
}

// Start a break every 2 hours
setInterval(startBreak, BREAK_EVERY);
</script>

</body>
</html>
