
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrcie Kwenye Mic TV</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#111;
    border-bottom:3px solid red;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid gold;
}

h1{
    color:gold;
    font-size:28px;
}

.live-badge{
    display:inline-block;
    background:red;
    color:#fff;
    padding:6px 14px;
    border-radius:30px;
    font-weight:bold;
    margin-top:8px;
    animation:pulse 1s infinite;
}

#clock{
    color:#00ff66;
    font-size:22px;
    font-weight:bold;
    margin-left:15px;
}

.player-container{
    width:95%;
    max-width:1000px;
    margin:25px auto;
    border:5px solid gold;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 25px gold;
}

iframe{
    width:100%;
    height:520px;
    border:none;
}

#viewerCount{
    width:fit-content;
    margin:20px auto;
    background:red;
    color:white;
    font-size:28px;
    font-weight:bold;
    padding:12px 25px;
    border-radius:18px;
}

.now-playing,
.schedule{
    width:95%;
    max-width:1000px;
    margin:25px auto;
    background:#111;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,215,0,.4);
}

.now-playing h2,
.schedule h2{
    color:gold;
    font-size:36px;
    margin-bottom:15px;
}

.now-playing p,
.schedule li{
    font-size:24px;
    line-height:1.8;
}

.schedule ul{
    list-style:none;
}

.schedule li{
    padding:12px 0;
    border-bottom:1px solid #333;
}

.ticker{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:red;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    padding:10px;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.5;}
    100%{opacity:1;}
}
